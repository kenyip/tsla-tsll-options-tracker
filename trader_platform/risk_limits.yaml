# Conservative defaults for isolated Agentic sleeve ($3000 planning capital).
# Tuned via recommend_risk_limits(3000). Never paste secrets into chat.

agentic:
  enabled: false  # soft kill; must be true for agentic_live

# Kill switch file (repo-relative or absolute). Presence => deny all mutating orders.
kill_switch_file: agentic_kill.switch

order:
  allow_market: false
  max_notional_per_order: 300.0   # ~10% of $3k sleeve
  max_contracts_per_order: 1      # 1-lot default on $3k; bump only with evidence
  allowed_sides: [buy, sell]
  allowed_order_types: [limit]  # market denied by default

portfolio:
  max_open_risk: 750.0           # ~25% of $3k (note: cash CSP collateral may exceed this)
  max_open_orders: 3
  max_daily_loss: 300.0          # ~10% of $3k

# Empty allowlist = all strategies allowed at risk layer (promotion still gates live status).
# Prefer explicit IDs once a live set is armed.
strategy_allowlist: []
strategy_disabled: []

# Empty instrument_allowlist = no instrument restriction / full symbol freedom
# at the risk_governor instrument layer (if instruments and symbol not in …).
# Research universe remains universe.yaml; capital_fit + kill switch + notional
# still apply. TSLA/TSLL are Ken advice seeds (personal vehicles when asked),
# not the live autonomous order allowlist. agentic.enabled remains false.
instrument_allowlist: []

# Capital-fit judgment (above notional-only risk_governor checks).
# Prevents unattended paper ticks from placing naked short premium on levered
# names when max loss is undefined. Prefer attaching max_loss_usd on intents.
capital_fit:
  enabled: true
  sleeve_usd: 3000
  reject_undefined_risk_on_levered: true
  levered_underlyings: [TSLL]
